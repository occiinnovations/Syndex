<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body {
  width: 320px;
  padding: 20px;
  background: #2a2a2a;
  color: #fff;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  margin: 0;
}
 
h1 {
  font-size: 24px;
  font-weight: 900;
  margin: 0 0 12px 0;
  letter-spacing: -0.5px;
}
 
p {
  font-size: 13px;
  color: #b4b4b4;
  line-height: 1.5;
  margin: 0;
}
 
.info {
  background: #333;
  border-radius: 8px;
  padding: 12px;
  margin-top: 16px;
  font-size: 12px;
  border-left: 3px solid #007acc;
}
</style>
</head>
<body>
<h1>Syndex</h1>
<p>Double-click and hold any word to see synonyms. Use arrow keys or scroll to navigate.</p>
<div class="info">
  Press Enter to replace, Escape to close.
</div>
</body>
</html>
